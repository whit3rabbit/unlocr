name: release

# Tag-driven release. Push a tag like v0.1.0 (use ./release.sh) and this builds
# a native binary on each OS runner and attaches them to the GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # musl static link needs the musl C toolchain.
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cargo-auditable
        run: cargo install cargo-auditable

      - name: Build
        run: cargo auditable build --release --locked --target ${{ matrix.target }} --manifest-path Cargo.toml

      # Package: tar.gz on unix, zip on windows. Name carries version + triple.
      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          name="unlocr-${ver}-${{ matrix.target }}"
          tar -C "target/${{ matrix.target }}/release" -czf "${name}.tar.gz" unlocr
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          echo "ASSET=${name}.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM=${name}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          $name = "unlocr-$ver-${{ matrix.target }}"
          Compress-Archive -Path "target/${{ matrix.target }}/release/unlocr.exe" -DestinationPath "$name.zip"
          $hash = (Get-FileHash -Path "$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -FilePath "$name.zip.sha256" -Encoding ascii
          "ASSET=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CHECKSUM=$name.zip.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        # SBOM is best-effort: never let it skip the binary upload (steps below).
        # `path:` makes syft treat the tarball as a dir/OCI source and error out;
        # `file:` scans the single archive file, which is what we want here.
        continue-on-error: true
        with:
          file: ${{ env.ASSET }}
          format: spdx-json
          output-file: ${{ env.ASSET }}.spdx.json

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ env.ASSET }}

      - name: Upload to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}
            ${{ env.ASSET }}.spdx.json

  # Native CLI .deb + .rpm (amd64 only) via the existing Makefile/packaging scripts.
  # arm64 packages are not built here (needs a cross toolchain or arm runner).
  linux-packages:
    name: linux deb/rpm (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # dpkg-deb ships in base; `rpm` provides rpmbuild.
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y rpm dpkg-dev

      - name: Build .deb + .rpm
        run: |
          make deb
          make rpm

      - name: Checksums
        run: |
          cd dist
          for f in *.deb *.rpm; do sha256sum "$f" > "$f.sha256"; done

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.deb
            dist/*.rpm

      - name: Upload to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.sha256
